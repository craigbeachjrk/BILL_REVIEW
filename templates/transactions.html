<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions &middot; Bill Review @ JRK</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box}
    :root{
      --void:#0a0e1a;--surface:#111827;--surface2:#1a2332;--edge:#2a3548;--dim:#4b5c78;
      --text:#c8d6e5;--bright:#e8f0fe;
      --cyan:#06d6a0;--cyan-dim:rgba(6,214,160,.12);
      --blue:#3a86ff;--blue-dim:rgba(58,134,255,.1);
      --amber:#ffbe0b;--red:#ef476f;--purple:#8338ec;
      --mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
    }
    body{font-family:var(--sans);margin:0;background:var(--void);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(58,134,255,.05),transparent),
      radial-gradient(ellipse 60% 40% at 20% 100%,rgba(6,214,160,.03),transparent);pointer-events:none}
    header{position:sticky;top:0;z-index:100;height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;
      background:rgba(10,14,26,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--edge)}
    header .left{display:flex;align-items:center;gap:14px}
    header .back{color:var(--dim);text-decoration:none;font-size:18px;transition:color .15s}
    header .back:hover{color:var(--cyan)}
    header h1{margin:0;font-size:15px;font-weight:700;color:var(--bright)}
    header h1 span{color:var(--cyan);font-family:var(--mono)}
    .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:blink 2s infinite;margin-left:10px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .nav-link{color:var(--dim);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid var(--edge);border-radius:8px;transition:all .15s}
    .nav-link:hover{color:var(--bright);border-color:var(--dim)}
    .shell{max-width:1200px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
    .card{background:var(--surface);border:1px solid var(--edge);border-radius:14px;padding:20px 24px}
    .card h3{margin:0 0 16px;font-size:12px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;color:var(--dim)}
    .stage-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(42,53,72,.4)}
    .stage-row:last-child{border:none}
    .stage-name{font-size:13px;font-weight:500;color:var(--text)}
    .stage-count{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--cyan)}
    .stage-count.warn{color:var(--amber)}
    .stage-count.err{color:var(--red)}
    .stage-failed{font-size:11px;font-family:var(--mono);color:var(--red);font-weight:600;margin-left:8px}
    .stage-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--edge);overflow:hidden}
    .stage-bar-fill{height:100%;border-radius:2px;background:var(--cyan);transition:width .4s ease}
    .chart-wrap{height:240px;position:relative}
    .user-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(42,53,72,.3)}
    .user-row:last-child{border:none}
    .user-row .name{color:var(--text);font-family:var(--mono);font-size:12px}
    .user-row .count{font-weight:700;color:var(--blue);font-family:var(--mono)}
    .feed{max-height:420px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--edge) transparent}
    .feed-item{padding:8px 0;border-bottom:1px solid rgba(42,53,72,.3);display:flex;align-items:center;gap:10px;font-size:12px;
      animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .feed-item:last-child{border:none}
    .ev-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:.3px;white-space:nowrap}
    .ev-tag.RECEIVED,.ev-tag.ENRICHED,.ev-tag.PARSE_COMPLETED{background:rgba(6,214,160,.12);color:var(--cyan)}
    .ev-tag.SUBMITTED,.ev-tag.POSTED,.ev-tag.ADVANCED_TO_POST{background:var(--blue-dim);color:var(--blue)}
    .ev-tag.PARSE_FAILED,.ev-tag.DELETED,.ev-tag.ENRICHMENT_FAILED{background:rgba(239,71,111,.12);color:var(--red)}
    .ev-tag.UBI_ASSIGNED,.ev-tag.ARCHIVED{background:rgba(131,56,236,.12);color:var(--purple)}
    .ev-tag.PARSE_STARTED,.ev-tag.ROUTED_STANDARD,.ev-tag.ROUTED_LARGE{background:rgba(255,190,11,.1);color:var(--amber)}
    .ev-tag.REWORKED{background:rgba(251,86,7,.1);color:#fb5607}
    .feed-file{color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:11px}
    .feed-time{color:var(--dim);font-family:var(--mono);font-size:11px;white-space:nowrap}
    .empty-state{text-align:center;padding:40px;color:var(--dim);font-size:13px}
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a href="/" class="back">&#8592;</a>
      <h1><span>//</span> Transactions</h1>
      <div class="pulse-dot"></div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/my-bills" class="nav-link">My Bills</a>
      <a href="/pipeline" class="nav-link">Pipeline</a>
    </div>
  </header>
  <div class="shell">
    <div class="grid">
      <div class="card">
        <h3>Pipeline Stages &mdash; 24h</h3>
        <div id="stageCards"><div class="empty-state">Loading...</div></div>
      </div>
      <div class="card">
        <h3>Hourly Volume</h3>
        <div class="chart-wrap"><canvas id="hourlyChart"></canvas></div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h3>Activity by User</h3>
        <div id="userActivity"><div class="empty-state">Loading...</div></div>
      </div>
      <div class="card">
        <h3>Live Event Feed</h3>
        <div class="feed" id="eventFeed"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </div>
<script>
  let hChart=null;
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  async function load(){
    try{
      const resp=await fetch('/api/transactions/summary?hours=24');
      if(resp.status===401){window.location='/login';return}
      const d=await resp.json();
      const sc=d.stage_counts||{};
      const funnel=d.pipeline_funnel||[];

      let sh='';
      const maxCount=Math.max(1,...funnel.map(f=>f.count+f.failed));
      funnel.forEach(f=>{
        if(f.count===0&&f.failed===0) return;
        const barPct=Math.round((f.count/maxCount)*100);
        sh+=`<div class="stage-row">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="stage-name">${esc(f.label)}</span>
              <span>
                <span class="stage-count">${f.count}</span>
                ${f.failed?'<span class="stage-failed">'+f.failed+' failed</span>':''}
              </span>
            </div>
            <div class="stage-bar"><div class="stage-bar-fill" style="width:${barPct}%"></div></div>
          </div>
        </div>`;
      });
      ['FAILED','DELETED','REWORK'].forEach(s=>{if(sc[s])
        sh+=`<div class="stage-row"><span class="stage-name" style="color:var(--red)">${esc(s)}</span><span class="stage-count err">${sc[s]}</span></div>`;
      });
      document.getElementById('stageCards').innerHTML=sh||'<div class="empty-state">No activity</div>';

      const hr=d.hourly||{},hours=Object.keys(hr).sort();
      const ds=[
        {label:'Received',data:hours.map(h=>(hr[h]||{}).RECEIVED||0),backgroundColor:'#06d6a0'},
        {label:'Parsed',data:hours.map(h=>(hr[h]||{}).PARSE_COMPLETED||0),backgroundColor:'#3a86ff'},
        {label:'Posted',data:hours.map(h=>(hr[h]||{}).POSTED||0),backgroundColor:'#8338ec'},
        {label:'Failed',data:hours.map(h=>(hr[h]||{}).PARSE_FAILED||0),backgroundColor:'#ef476f'},
      ];
      if(hChart)hChart.destroy();
      hChart=new Chart(document.getElementById('hourlyChart'),{type:'bar',data:{labels:hours,datasets:ds},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{x:{stacked:true,ticks:{color:'#4b5c78',font:{family:'JetBrains Mono',size:10}},grid:{color:'rgba(42,53,72,.4)'}},
                  y:{stacked:true,beginAtZero:true,ticks:{color:'#4b5c78',font:{family:'JetBrains Mono',size:10}},grid:{color:'rgba(42,53,72,.4)'}}},
          plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11,family:'DM Sans'},color:'#4b5c78'}}}}});

      const bu=d.by_user||{};
      let uh='';Object.entries(bu).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([u,c])=>{
        uh+=`<div class="user-row"><span class="name">${esc(u)}</span><span class="count">${c}</span></div>`;
      });
      document.getElementById('userActivity').innerHTML=uh||'<div class="empty-state">No activity</div>';

      const evts=d.recent_events||[];
      let fh='';evts.forEach(ev=>{
        const t=ev.time?(()=>{let s=ev.time;if(s.endsWith('+00:00'))s=s.replace('+00:00','Z');else if(!s.endsWith('Z'))s+='Z';const d=new Date(s);return isNaN(d)?'':d.toLocaleTimeString();})():'';
        fh+=`<div class="feed-item">
          <span class="ev-tag ${esc(ev.event_type)}">${esc(ev.event_type)}</span>
          <span class="feed-file">${esc((ev.filename||'').substring(0,35))}</span>
          <span class="feed-time">${t}</span>
        </div>`;
      });
      document.getElementById('eventFeed').innerHTML=fh||'<div class="empty-state">No events</div>';
    }catch(e){console.error(e)}
  }
  load();setInterval(load,30000);
</script>
</body>
</html>
