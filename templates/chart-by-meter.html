<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chart by Meter - Bill Review @ JRK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    :root { --bg:#0ea5e9; --bg2:#4338ca; --glass:rgba(255,255,255,.72); --border:rgba(255,255,255,.33); }
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh;color:#0f172a}
    header.top{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;color:#fff;z-index:100}
    .logout{display:flex;gap:8px;align-items:center}
    .logout form{display:inline}
    .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:none;background:#0ea5e9;color:#fff;cursor:pointer;text-decoration:none;font-size:14px;font-family:inherit}
    .btn.secondary{background:#64748b}
    .btn.small{padding:6px 10px;font-size:12px}
    .btn.success{background:#10b981}
    .btn.danger{background:#ef4444}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .wrap{max-width:1600px;margin:40px auto;padding:0 40px}
    h1{margin:0 0 20px 0}
    .card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:24px;margin-bottom:20px}
    select,input{padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:20px}
    .stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center}
    .stat-value{font-size:28px;font-weight:700;color:#0ea5e9}
    .stat-label{font-size:12px;color:#64748b;margin-top:4px}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:13px}
    th{background:#f9fafb;font-weight:600;position:sticky;top:0;z-index:10}
    tr:hover{background:#f9fafb}
    .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
    .badge.electric{background:#fef3c7;color:#92400e}
    .badge.gas{background:#dbeafe;color:#1e40af}
    .badge.water{background:#d1fae5;color:#065f46}
    .badge.sewer{background:#e0e7ff;color:#3730a3}
    .badge.flagged{background:#fee2e2;color:#991b1b}
    .badge.warning{background:#fef3c7;color:#92400e}
    .toast{position:fixed;top:20px;right:20px;background:#111827;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .3s}
    .toast.show{opacity:.96}
    .toast.ok{background:#0f766e}
    .toast.err{background:#b91c1c}
    .loading{text-align:center;padding:40px;color:#64748b}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e5e7eb;border-top:3px solid #0ea5e9;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;vertical-align:middle}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .chart-container{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;height:400px}
    .meter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .meter-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e7eb;cursor:pointer;transition:all .2s}
    .meter-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
    .meter-card h3{margin:0 0 8px 0;font-size:14px}
    .meter-card .meta{font-size:12px;color:#64748b}
    .meter-card .readings{font-size:14px;color:#64748b;margin-top:4px}
    .meter-card .consumption{font-size:22px;font-weight:700;color:#0ea5e9;margin-top:4px}
    .meter-card .sparkline{height:50px;margin:8px 0}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:10000;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:1000px;width:calc(100% - 80px);padding:24px;max-height:85vh;overflow-y:auto}
    .modal-box h2{margin:0 0 16px 0;font-size:18px}
    .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #e5e7eb;padding-bottom:0}
    .tab{padding:8px 16px;cursor:pointer;border-radius:8px 8px 0 0;font-weight:600;color:#64748b}
    .tab.active{background:#0ea5e9;color:#fff}
    .tab-content{display:none}
    .tab-content.active{display:block}

    .breadcrumb{display:flex;gap:8px;align-items:center;padding:10px 0;font-size:14px;color:#64748b}
    .breadcrumb a{color:#0ea5e9;text-decoration:none;cursor:pointer}
    .breadcrumb a:hover{text-decoration:underline}
    .breadcrumb .sep{color:#cbd5e1}
    .utility-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
    .utility-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid #e5e7eb}
    .utility-card.electric{border-left-color:#f59e0b}
    .utility-card.gas{border-left-color:#3b82f6}
    .utility-card.water{border-left-color:#10b981}
    .utility-card.sewer{border-left-color:#6366f1}
    .utility-card h4{margin:0 0 8px 0;font-size:14px}
    .utility-card .big-num{font-size:24px;font-weight:700}
    .issue-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
    .issue-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
    .issue-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .issue-card h4{margin:0 0 4px 0;font-size:13px;color:#64748b}
    .issue-card .count{font-size:28px;font-weight:700}
    .issue-card .impact{font-size:13px;color:#64748b}
    .issue-card.rate .count{color:#ef4444}
    .issue-card.volume .count{color:#f59e0b}
    .issue-card.data .count{color:#6366f1}
    .property-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .property-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;border:1px solid #e5e7eb}
    .property-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
    .property-card h3{margin:0 0 4px 0;font-size:15px}
    .property-card .state{font-size:12px;color:#64748b}
    .property-card .prop-stats{display:flex;gap:16px;margin-top:8px;font-size:13px}
    .property-card .issue-badge{background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
    .top-issues{margin-top:20px}
    .top-issues table{font-size:13px}
    .admin-menu{position:relative;display:inline-block}
    .admin-dropdown{display:none;position:absolute;right:0;top:100%;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:200px;z-index:200;overflow:hidden}
    .admin-dropdown.show{display:block}
    .admin-dropdown button{display:block;width:100%;padding:10px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:13px;font-family:inherit}
    .admin-dropdown button:hover{background:#f1f5f9}
    .view-section{display:none}
    .view-section.active{display:block}
    .flag-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600;margin:1px}
    .flag-badge.rate_increase{background:#fee2e2;color:#991b1b}
    .flag-badge.volume_spike{background:#fef3c7;color:#92400e}
    .flag-badge.drop{background:#dbeafe;color:#1e40af}
    .flag-badge.gap{background:#e0e7ff;color:#3730a3}
  </style>
</head>
<body>
  <header class="top">
    <div><a href="/" style="color:#fff;text-decoration:none;font-weight:600">Bill Review @ JRK - Chart by Meter</a></div>
    <div class="logout">
      <a class="btn secondary" href="/">Home</a>
      <form method="post" action="/logout"><button class="btn" type="submit">Logout</button></form>
    </div>
  </header>
  <div id="toast" class="toast"></div>
  <div class="wrap">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <h1 style="margin:0">Chart by Meter</h1>
          <div class="breadcrumb" id="breadcrumb">
            <span class="current">Portfolio</span>
          </div>
        </div>
        <div class="admin-menu">
          <button class="btn secondary" onclick="toggleAdminMenu()">Actions &#9662;</button>
          <div class="admin-dropdown" id="adminDropdown">
            <button onclick="adminAction('scan')">Scan for New Data</button>
            <button onclick="adminAction('rescan')">Full Rescan</button>
            <button onclick="adminAction('rebuild')">Rebuild Analytics</button>
            <button onclick="adminAction('ai-clean')">AI Analysis</button>
          </div>
        </div>
      </div>
      <div id="lastUpdated" style="font-size:12px;color:#64748b;margin-bottom:16px"></div>

      <div id="loadingView" class="loading"><span class="spinner"></span> Loading analytics...</div>

      <!-- Portfolio View -->
      <div id="portfolioView" class="view-section">
        <div class="stats-grid" id="portfolioStats"></div>
        <div class="utility-cards" id="utilityCards"></div>
        <div class="issue-cards" id="issueCards"></div>
        <h3>Properties</h3>
        <div style="margin-bottom:12px">
          <input type="text" id="propSearch" placeholder="Search properties..." oninput="filterProperties()" style="width:300px">
        </div>
        <div class="property-grid" id="propertyGrid"></div>
        <div class="top-issues card" id="topIssuesSection" style="margin-top:20px">
          <h3>Top Issues by Cost Impact</h3>
          <div id="topIssuesTable"></div>
        </div>
      </div>

      <!-- Property View -->
      <div id="propertyView" class="view-section">
        <div class="stats-grid" id="propStats"></div>
        <div class="chart-container" id="propChartContainer"><canvas id="propConsumptionChart"></canvas></div>
        <div class="chart-container" id="propRateContainer"><canvas id="propRateChart"></canvas></div>
        <div id="propIssues" style="margin-bottom:20px"></div>
        <h3>Meters</h3>
        <div class="meter-grid" id="propMeterGrid"></div>
      </div>

      <!-- Meter View -->
      <div id="meterView" class="view-section">
        <div class="stats-grid" id="meterStats"></div>
        <div class="chart-container" style="height:350px"><canvas id="meterChart"></canvas></div>
        <div id="meterFlags" style="margin-bottom:20px"></div>
        <h3>Readings</h3>
        <div id="meterReadingsTable"></div>
      </div>
    </div>
  </div>

<script>
/* ── Global State ─────────────────────────────────────── */
let DATA = null;
let currentView = 'portfolio';
let currentPropertyId = null;
let currentMeterId = null;
let propChartInstance = null;
let propRateChartInstance = null;
let meterChartInstance = null;

const UTILITY_COLORS = {
  electric: '#f59e0b', electricity: '#f59e0b',
  gas: '#3b82f6',
  water: '#10b981',
  sewer: '#6366f1'
};

const UTILITY_CLASS = {
  electric: 'electric', electricity: 'electric',
  gas: 'gas', water: 'water', sewer: 'sewer'
};

/* ── Formatting helpers ───────────────────────────────── */
function fmtNum(n) {
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString('en-US');
}
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '-';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}
function fmtRate(n) {
  if (n == null || isNaN(n)) return '-';
  return Number(n).toFixed(4);
}
function utilColor(ut) {
  return UTILITY_COLORS[(ut || '').toLowerCase()] || '#94a3b8';
}
function utilClass(ut) {
  return UTILITY_CLASS[(ut || '').toLowerCase()] || '';
}
function capitalise(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* ── Toast ────────────────────────────────────────────── */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type === 'error' ? 'err' : 'ok');
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

/* ── Admin menu ───────────────────────────────────────── */
function toggleAdminMenu() {
  document.getElementById('adminDropdown').classList.toggle('show');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.admin-menu')) {
    document.getElementById('adminDropdown').classList.remove('show');
  }
});

async function adminAction(action) {
  document.getElementById('adminDropdown').classList.remove('show');
  try {
    let resp;
    if (action === 'scan') {
      resp = await fetch('/api/meters/bulk-rescan', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'scan'})});
    } else if (action === 'rescan') {
      resp = await fetch('/api/meters/bulk-rescan', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'rescan'})});
    } else if (action === 'rebuild') {
      resp = await fetch('/api/meters/rebuild', {method:'POST'});
    } else if (action === 'ai-clean') {
      resp = await fetch('/api/meters/ai-clean', {method:'POST'});
    }
    const data = await resp.json();
    showToast(data.message || data.status || 'Action completed', resp.ok ? 'ok' : 'error');
  } catch (err) {
    showToast('Action failed: ' + err.message, 'error');
  }
}

/* ── Navigation ───────────────────────────────────────── */
function navigateTo(view, id) {
  currentView = view;
  if (view === 'portfolio') {
    currentPropertyId = null;
    currentMeterId = null;
  } else if (view === 'property') {
    currentPropertyId = id;
    currentMeterId = null;
  } else if (view === 'meter') {
    currentMeterId = id;
  }
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  const target = view === 'portfolio' ? 'portfolioView' : view === 'property' ? 'propertyView' : 'meterView';
  document.getElementById(target).classList.add('active');
  updateBreadcrumb();
  if (view === 'portfolio') renderPortfolio();
  else if (view === 'property') renderProperty(id);
  else if (view === 'meter') renderMeter(id);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '';
  if (currentView === 'portfolio') {
    html = '<span class="current">Portfolio</span>';
  } else if (currentView === 'property') {
    const prop = DATA.properties[currentPropertyId];
    const name = prop ? prop.property_name : currentPropertyId;
    html = '<a onclick="navigateTo(\'portfolio\')">Portfolio</a><span class="sep">/</span><span class="current">' + escHtml(name) + '</span>';
  } else if (currentView === 'meter') {
    const meter = DATA.meters[currentMeterId];
    const propId = meter ? meter.property_id : currentPropertyId;
    const prop = DATA.properties[propId];
    const propName = prop ? prop.property_name : propId;
    const meterNum = meter ? meter.meter_number : currentMeterId;
    html = '<a onclick="navigateTo(\'portfolio\')">Portfolio</a><span class="sep">/</span>'
         + '<a onclick="navigateTo(\'property\',\'' + escAttr(propId) + '\')">' + escHtml(propName) + '</a>'
         + '<span class="sep">/</span><span class="current">Meter ' + escHtml(meterNum) + '</span>';
  }
  bc.innerHTML = html;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

/* ── Portfolio View ───────────────────────────────────── */
function renderPortfolio() {
  if (!DATA) return;
  const p = DATA.portfolio;

  // Stats
  document.getElementById('portfolioStats').innerHTML =
    statCard(fmtNum(p.total_properties), 'Properties') +
    statCard(fmtNum(p.total_meters), 'Meters') +
    statCard(fmtNum(p.total_readings), 'Readings') +
    statCard(DATA.generated_at ? new Date(DATA.generated_at).toLocaleDateString() : '-', 'Last Updated');

  // Utility cards
  const byUtil = p.by_utility || {};
  let ucHtml = '';
  for (const [ut, info] of Object.entries(byUtil)) {
    const months = Object.keys(info.monthly || {}).sort();
    const latest = months.length ? info.monthly[months[months.length - 1]] : {};
    ucHtml += '<div class="utility-card ' + utilClass(ut) + '">'
      + '<h4>' + capitalise(ut) + '</h4>'
      + '<div class="big-num">' + fmtNum(info.meters) + ' meters</div>'
      + '<div style="font-size:13px;color:#64748b;margin-top:4px">'
      + 'Latest: ' + fmtNum(latest.consumption) + ' consumption &middot; ' + fmtMoney(latest.cost)
      + '</div></div>';
  }
  document.getElementById('utilityCards').innerHTML = ucHtml;

  // Issue cards
  const iss = p.issues_summary || {};
  const ri = iss.rate_increases || {count:0, est_monthly_impact:0};
  const vs = iss.volume_spikes || {count:0, est_monthly_impact:0};
  const di = iss.data_issues || {count:0, est_monthly_impact:0};
  document.getElementById('issueCards').innerHTML =
    '<div class="issue-card rate"><h4>Rate Increases</h4><div class="count">' + fmtNum(ri.count) + '</div><div class="impact">Est. ' + fmtMoney(ri.est_monthly_impact) + '/mo</div></div>'
    + '<div class="issue-card volume"><h4>Volume Spikes</h4><div class="count">' + fmtNum(vs.count) + '</div><div class="impact">Est. ' + fmtMoney(vs.est_monthly_impact) + '/mo</div></div>'
    + '<div class="issue-card data"><h4>Data Issues</h4><div class="count">' + fmtNum(di.count) + '</div><div class="impact">Est. ' + fmtMoney(di.est_monthly_impact) + '/mo</div></div>';

  // Property grid
  renderPropertyGrid();

  // Top issues table
  renderTopIssues();
}

function renderPropertyGrid() {
  const props = DATA.properties || {};
  const search = (document.getElementById('propSearch').value || '').toLowerCase();
  const entries = Object.entries(props)
    .filter(([id, p]) => {
      if (!search) return true;
      return (p.property_name || '').toLowerCase().includes(search) || id.toLowerCase().includes(search) || (p.state || '').toLowerCase().includes(search);
    })
    .sort((a, b) => {
      const aIss = (a[1].issues || []).length;
      const bIss = (b[1].issues || []).length;
      return bIss - aIss;
    });

  let html = '';
  for (const [propId, prop] of entries) {
    const issCount = (prop.issues || []).length;
    html += '<div class="property-card" onclick="navigateTo(\'property\',\'' + escAttr(propId) + '\')">'
      + '<h3>' + escHtml(prop.property_name || propId) + '</h3>'
      + '<div class="state">' + escHtml(prop.state || '') + '</div>'
      + '<div class="prop-stats">'
      + '<span>' + fmtNum(prop.meter_count) + ' meters</span>'
      + (issCount > 0 ? '<span class="issue-badge">' + issCount + ' issue' + (issCount !== 1 ? 's' : '') + '</span>' : '')
      + '</div></div>';
  }
  document.getElementById('propertyGrid').innerHTML = html || '<div style="color:#64748b">No properties found.</div>';
}

function filterProperties() {
  renderPropertyGrid();
}

function renderTopIssues() {
  const issues = (DATA.portfolio.top_issues || []).slice(0, 20);
  if (!issues.length) {
    document.getElementById('topIssuesTable').innerHTML = '<div style="color:#64748b;padding:12px">No issues found.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Property</th><th>Meter</th><th>Type</th><th>Issue</th><th>Est. Impact</th></tr></thead><tbody>';
  for (const iss of issues) {
    html += '<tr><td>' + escHtml(iss.property_name || iss.property) + '</td>'
      + '<td>' + escHtml(iss.meter_id) + '</td>'
      + '<td><span class="flag-badge ' + (iss.type || '') + '">' + escHtml(iss.type) + '</span></td>'
      + '<td>' + escHtml(iss.message) + '</td>'
      + '<td>' + fmtMoney(iss.cost_impact) + '</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('topIssuesTable').innerHTML = html;
}

function statCard(value, label) {
  return '<div class="stat-card"><div class="stat-value">' + value + '</div><div class="stat-label">' + label + '</div></div>';
}

/* ── Property View ────────────────────────────────────── */
function renderProperty(propId) {
  const prop = DATA.properties[propId];
  if (!prop) { showToast('Property not found', 'error'); return; }

  // Get meters for this property
  const propMeters = Object.entries(DATA.meters || {}).filter(([k, m]) => m.property_id === propId);

  // Stats
  const issCount = (prop.issues || []).length;
  const byUtil = prop.by_utility || {};
  const months = new Set();
  for (const u of Object.values(byUtil)) {
    for (const m of Object.keys(u.monthly || {})) months.add(m);
  }
  const sortedMonths = [...months].sort();
  const latestMonth = sortedMonths.length ? sortedMonths[sortedMonths.length - 1] : null;
  let latestSpend = 0;
  if (latestMonth) {
    for (const u of Object.values(byUtil)) {
      latestSpend += (u.monthly[latestMonth] || {}).cost || 0;
    }
  }

  document.getElementById('propStats').innerHTML =
    statCard(escHtml(prop.property_name || propId), 'Property') +
    statCard(fmtNum(prop.meter_count), 'Meters') +
    statCard(fmtNum(issCount), 'Issues') +
    statCard(fmtMoney(latestSpend), 'Latest Month Spend');

  // Consumption chart (stacked bar by utility)
  if (propChartInstance) { propChartInstance.destroy(); propChartInstance = null; }
  const last12 = sortedMonths.slice(-12);
  const utilTypes = Object.keys(byUtil);
  const datasets = utilTypes.map(ut => ({
    label: capitalise(ut),
    data: last12.map(m => (byUtil[ut].monthly[m] || {}).consumption || 0),
    backgroundColor: utilColor(ut),
    borderRadius: 4
  }));
  const ctx1 = document.getElementById('propConsumptionChart').getContext('2d');
  propChartInstance = new Chart(ctx1, {
    type: 'bar',
    data: { labels: last12, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: 'Monthly Consumption by Utility' }, datalabels: { display: false } },
      scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
    }
  });

  // Rate chart (line per utility)
  if (propRateChartInstance) { propRateChartInstance.destroy(); propRateChartInstance = null; }
  const rateDatasets = utilTypes.map(ut => ({
    label: capitalise(ut),
    data: last12.map(m => (byUtil[ut].monthly[m] || {}).rate || 0),
    borderColor: utilColor(ut),
    backgroundColor: utilColor(ut) + '33',
    tension: 0.3,
    fill: false,
    pointRadius: 3
  }));
  const ctx2 = document.getElementById('propRateChart').getContext('2d');
  propRateChartInstance = new Chart(ctx2, {
    type: 'line',
    data: { labels: last12, datasets: rateDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: 'Monthly Rate Trend by Utility' }, datalabels: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });

  // Issues
  const issues = prop.issues || [];
  if (issues.length) {
    let iHtml = '<h3>Issues (' + issues.length + ')</h3>';
    for (const iss of issues) {
      iHtml += '<div style="background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px">'
        + '<span class="flag-badge ' + (iss.type || '') + '">' + escHtml(iss.type) + '</span> '
        + escHtml(iss.message)
        + (iss.cost_impact ? ' &mdash; ' + fmtMoney(iss.cost_impact) : '')
        + '</div>';
    }
    document.getElementById('propIssues').innerHTML = iHtml;
  } else {
    document.getElementById('propIssues').innerHTML = '';
  }

  // Meter cards
  let mHtml = '';
  const sortedMeters = propMeters.sort((a, b) => (b[1].flags || []).length - (a[1].flags || []).length);
  for (const [meterId, meter] of sortedMeters) {
    const flags = meter.flags || [];
    let flagHtml = '';
    for (const f of flags.slice(0, 3)) {
      flagHtml += '<span class="flag-badge ' + (f.type || '') + '">' + escHtml(f.type) + '</span> ';
    }
    if (flags.length > 3) flagHtml += '<span style="font-size:11px;color:#64748b">+' + (flags.length - 3) + ' more</span>';

    mHtml += '<div class="meter-card" onclick="navigateTo(\'meter\',\'' + escAttr(meterId) + '\')">'
      + '<div style="display:flex;justify-content:space-between;align-items:start">'
      + '<h3>' + escHtml(meter.meter_number) + '</h3>'
      + '<span class="badge ' + utilClass(meter.utility_type) + '">' + capitalise(meter.utility_type || '') + '</span>'
      + '</div>'
      + '<div class="meta">' + escHtml(meter.uom || '') + (meter.building ? ' &middot; Bldg ' + escHtml(meter.building) : '') + '</div>'
      + '<div class="readings">' + fmtNum(meter.reading_count) + ' readings &middot; Latest: ' + escHtml(meter.latest_date || '-') + '</div>'
      + '<div class="sparkline"><canvas id="spark_' + meterId.replace(/[^a-zA-Z0-9]/g, '_') + '"></canvas></div>'
      + '<div>' + flagHtml + '</div>'
      + '</div>';
  }
  document.getElementById('propMeterGrid').innerHTML = mHtml || '<div style="color:#64748b">No meters found.</div>';

  // Draw sparklines after DOM update
  requestAnimationFrame(() => {
    for (const [meterId, meter] of sortedMeters) {
      const canvasId = 'spark_' + meterId.replace(/[^a-zA-Z0-9]/g, '_');
      const canvas = document.getElementById(canvasId);
      if (canvas && meter.sparkline && meter.sparkline.length > 1) {
        drawSparkline(canvas, meter.sparkline, utilColor(meter.utility_type));
      }
    }
  });
}

/* ── Meter View ───────────────────────────────────────── */
async function renderMeter(meterId) {
  const meter = DATA.meters[meterId];
  if (!meter) { showToast('Meter not found', 'error'); return; }

  // Stats
  document.getElementById('meterStats').innerHTML =
    statCard(escHtml(meter.meter_number), 'Meter') +
    statCard('<span class="badge ' + utilClass(meter.utility_type) + '">' + capitalise(meter.utility_type || '') + '</span>', 'Utility') +
    statCard(escHtml(meter.uom || '-'), 'UOM') +
    statCard(fmtNum(meter.reading_count), 'Readings') +
    statCard(fmtRate(meter.latest_daily_rate), 'Latest Rate') +
    statCard(escHtml(meter.latest_date || '-'), 'Latest Date');

  // Dual-axis chart
  if (meterChartInstance) { meterChartInstance.destroy(); meterChartInstance = null; }
  const monthly = meter.monthly || {};
  const months = Object.keys(monthly).sort().slice(-12);
  const consumption = months.map(m => monthly[m].consumption || 0);
  const cost = months.map(m => monthly[m].cost || 0);
  const rate = months.map(m => monthly[m].daily_rate || monthly[m].rate || 0);

  const ctx = document.getElementById('meterChart').getContext('2d');
  meterChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        {
          label: 'Consumption',
          data: consumption,
          backgroundColor: utilColor(meter.utility_type) + 'aa',
          borderRadius: 4,
          yAxisID: 'y',
          order: 2
        },
        {
          label: 'Daily Rate',
          data: rate,
          type: 'line',
          borderColor: '#ef4444',
          backgroundColor: '#ef444433',
          tension: 0.3,
          pointRadius: 4,
          yAxisID: 'y1',
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: 'Consumption & Rate' }, datalabels: { display: false } },
      scales: {
        y: { beginAtZero: true, position: 'left', title: { display: true, text: 'Consumption' } },
        y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Rate' } }
      }
    }
  });

  // Flags
  const flags = meter.flags || [];
  if (flags.length) {
    let fHtml = '<h3>Flags (' + flags.length + ')</h3>';
    for (const f of flags) {
      fHtml += '<div style="background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px">'
        + '<span class="flag-badge ' + (f.type || '') + '">' + escHtml(f.type) + '</span> '
        + escHtml(f.message)
        + (f.cost_impact ? ' &mdash; ' + fmtMoney(f.cost_impact) : '')
        + (f.date ? ' <span style="color:#64748b">(' + escHtml(f.date) + ')</span>' : '')
        + '</div>';
    }
    document.getElementById('meterFlags').innerHTML = fHtml;
  } else {
    document.getElementById('meterFlags').innerHTML = '';
  }

  // Fetch readings
  document.getElementById('meterReadingsTable').innerHTML = '<div class="loading"><span class="spinner"></span> Loading readings...</div>';
  try {
    const resp = await fetch('/api/meters/' + encodeURIComponent(meterId) + '/readings');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const readings = await resp.json();
    renderReadingsTable(readings);
  } catch (err) {
    document.getElementById('meterReadingsTable').innerHTML = '<div style="color:#ef4444;padding:12px">Failed to load readings: ' + escHtml(err.message) + '</div>';
  }
}

function renderReadingsTable(readings) {
  const rows = Array.isArray(readings) ? readings : (readings.readings || readings.data || []);
  if (!rows.length) {
    document.getElementById('meterReadingsTable').innerHTML = '<div style="color:#64748b;padding:12px">No readings found.</div>';
    return;
  }
  // Sort newest first
  rows.sort((a, b) => {
    const da = a.service_end || a.reading_date || '';
    const db = b.service_end || b.reading_date || '';
    return db.localeCompare(da);
  });
  let html = '<div style="max-height:600px;overflow-y:auto"><table><thead><tr>'
    + '<th>Service Period</th><th>Consumption</th><th>UOM</th><th>Charge</th>'
    + '<th>$/Unit</th><th>Daily Rate</th><th>Days</th><th>Vendor</th><th>Flags</th><th>PDF</th>'
    + '</tr></thead><tbody>';
  for (const r of rows) {
    // Service period
    const sStart = r.service_start || '';
    const sEnd = r.service_end || r.reading_date || '';
    const period = sStart && sEnd ? escHtml(sStart) + ' &rarr; ' + escHtml(sEnd) : escHtml(sEnd || '-');

    // Consumption + UOM
    const cons = r.enriched_consumption || r.normalized_consumption || r.consumption || 0;
    const uom = r.canonical_uom || r.normalized_uom || r.raw_uom || '';

    // Charge
    const charge = r.amount || r.charge_amount || 0;

    // Effective rate ($/unit)
    const effRate = r.effective_rate || (cons > 0 && charge > 0 ? charge / cons : 0);

    // Daily rate
    let days = 0;
    if (sStart && sEnd) {
      try {
        const d1 = new Date(sStart.includes('/') ? sStart.split('/').length === 3 ? sStart.split('/')[2] + '-' + sStart.split('/')[0] + '-' + sStart.split('/')[1] : sStart : sStart);
        const d2 = new Date(sEnd.includes('/') ? sEnd.split('/').length === 3 ? sEnd.split('/')[2] + '-' + sEnd.split('/')[0] + '-' + sEnd.split('/')[1] : sEnd : sEnd);
        days = Math.max(1, Math.round((d2 - d1) / 86400000));
      } catch(e) { days = 0; }
    }
    const dailyRate = days > 0 && cons > 0 ? (cons / days) : 0;

    // Flags
    let flagHtml = '';
    if (r.flagged && r.flag_reason) {
      flagHtml = '<span class="flag-badge volume_spike">' + escHtml(r.flag_reason) + '</span>';
    }

    // PDF link
    const pdfId = r.source_pdf_id || '';
    const pdfLink = pdfId
      ? '<a href="/invoices?pdf_id=' + encodeURIComponent(pdfId) + '" target="_blank" class="btn small" style="padding:3px 8px;font-size:11px">View PDF</a>'
      : '-';

    html += '<tr>'
      + '<td style="white-space:nowrap">' + period + '</td>'
      + '<td style="text-align:right">' + fmtNum(cons) + '</td>'
      + '<td>' + escHtml(uom) + '</td>'
      + '<td style="text-align:right">' + fmtMoney(charge) + '</td>'
      + '<td style="text-align:right">' + fmtRate(effRate) + '</td>'
      + '<td style="text-align:right">' + (dailyRate > 0 ? fmtNum(Math.round(dailyRate * 100) / 100) : '-') + '/' + escHtml(uom ? uom + '/d' : 'd') + '</td>'
      + '<td style="text-align:center">' + (days || '-') + '</td>'
      + '<td>' + escHtml(r.vendor || r.vendor_name || '-') + '</td>'
      + '<td>' + flagHtml + '</td>'
      + '<td>' + pdfLink + '</td>'
      + '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('meterReadingsTable').innerHTML = html;
}

/* ── Sparkline ────────────────────────────────────────── */
function drawSparkline(canvas, values, color) {
  if (!values || values.length < 2) return;
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: values.map((_, i) => i),
      datasets: [{
        data: values,
        borderColor: color || '#0ea5e9',
        backgroundColor: (color || '#0ea5e9') + '22',
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        borderWidth: 1.5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false }, datalabels: { display: false } },
      scales: { x: { display: false }, y: { display: false } },
      elements: { point: { radius: 0 } },
      animation: false
    }
  });
}

/* ── Init ─────────────────────────────────────────────── */
async function init() {
  try {
    const resp = await fetch('/api/meters/analytics');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DATA = await resp.json();
    document.getElementById('loadingView').style.display = 'none';
    if (DATA.generated_at) {
      document.getElementById('lastUpdated').textContent = 'Analytics generated: ' + new Date(DATA.generated_at).toLocaleString();
    }
    navigateTo('portfolio');
  } catch (err) {
    document.getElementById('loadingView').innerHTML = '<span style="color:#ef4444">Failed to load analytics: ' + escHtml(err.message) + '</span>';
    showToast('Failed to load analytics', 'error');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
