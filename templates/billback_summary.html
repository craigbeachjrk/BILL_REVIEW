<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bill Inputs Report · Bill Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0ea5e9; --bg2:#4338ca; --glass:rgba(255,255,255,.72); --border:rgba(255,255,255,.33); }
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh;color:#0f172a}
    header.top{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;color:#fff;z-index:10}
    .logout{display:flex;gap:8px;align-items:center}
    .logout form{display:inline}
    .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:none;background:#0ea5e9;color:#fff;cursor:pointer;text-decoration:none;font-size:14px}
    .btn.secondary{background:#64748b}
    .btn.small{padding:6px 10px;font-size:12px}
    .wrap{max-width:1600px;margin:40px auto;padding:0 40px}
    h1{margin:0 0 20px 0}
    .card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:32px;margin-bottom:20px}
    .controls{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    select,input[type="text"]{padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;font-size:14px}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;margin-bottom:20px}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:13px}
    th{background:#f9fafb;font-weight:600}
    tr:hover{background:#f9fafb}
    .summary-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
    .summary-card h3{margin:0 0 12px 0;font-size:16px;color:#64748b}
    .summary-card .value{font-size:28px;font-weight:600;color:#0ea5e9}
    .group-section{margin-bottom:32px}
    .group-header{background:#f9fafb;padding:12px 16px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
    .group-title{font-size:16px;font-weight:600}
    .group-amount{font-size:18px;font-weight:600;color:#0ea5e9}
    .loading{text-align:center;padding:40px;color:#64748b}
    .toast{position:fixed;top:20px;right:20px;background:#111827;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .3s}
    .toast.show{opacity:.96}
    .toast.ok{background:#0f766e}
    .toast.err{background:#b91c1c}
    /* ===IMPROVE-CSS-START=== */
    .improve-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:10000;align-items:center;justify-content:center}
    .improve-modal-overlay.show{display:flex}
    .improve-modal-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:540px;width:92%;padding:24px;max-height:calc(100vh - 60px);overflow-y:auto}
    .improve-modal-box h2{margin:0 0 12px 0;font-size:18px}
    .improve-modal-box label{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
    .improve-modal-box input,.improve-modal-box textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:12px;font-family:inherit;font-size:14px;box-sizing:border-box}
    .improve-modal-box textarea{min-height:100px;resize:vertical}
    .improve-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
    .improve-toast{position:fixed;top:20px;right:20px;background:#111827;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:10001;opacity:0;transition:opacity .3s}
    .improve-toast.show{opacity:.96}
    .improve-toast.ok{background:#0f766e}
    .improve-toast.err{background:#b91c1c}
    .improve-path-badge{display:inline-block;background:#f1f5f9;color:#475569;font-size:12px;padding:3px 10px;border-radius:6px;margin-bottom:14px;font-family:monospace;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .improve-type-group{display:flex;gap:0;margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
    .improve-type-group label{display:flex;align-items:center;justify-content:center;flex:1;padding:8px 4px;margin:0;font-size:13px;font-weight:500;cursor:pointer;background:#fff;border-right:1px solid #e5e7eb;transition:background .15s,color .15s;text-align:center}
    .improve-type-group label:last-child{border-right:none}
    .improve-type-group input[type=radio]{display:none}
    .improve-type-group input[type=radio]:checked+span{background:transparent}
    .improve-type-group label.sel-bug{background:#fee2e2;color:#991b1b}
    .improve-type-group label.sel-enhancement{background:#ede9fe;color:#5b21b6}
    .improve-type-group label.sel-feature{background:#d1fae5;color:#065f46}
    .improve-ss-area{border:2px dashed #d1d5db;border-radius:10px;padding:14px;text-align:center;color:#94a3b8;font-size:13px;margin-bottom:12px;cursor:pointer;transition:border-color .2s,background .2s;min-height:40px}
    .improve-ss-area:hover,.improve-ss-area.drag{border-color:#0ea5e9;background:#f0f9ff}
    .improve-ss-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .improve-ss-thumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;height:72px}
    .improve-ss-thumb img{height:72px;display:block}
    .improve-ss-thumb .ss-remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;line-height:20px;text-align:center;cursor:pointer;padding:0}
    .improve-ss-thumb .ss-remove:hover{background:#ef4444}
    .improve-ss-uploading{opacity:.5}
    /* ===IMPROVE-CSS-END=== */
  </style>
</head>
<body>
  <header class="top">
    <div><a href="/" style="color:#fff;text-decoration:none;font-weight:600">Bill Review @ JRK · BILLBACK Summary</a></div>
      <div>
      <button class="btn secondary" id="improveBtn">IMPROVE</button>
      <a class="btn secondary" href="/billback">Back to Billback</a>
        <form method="post" action="/logout"><button class="btn" type="submit">Logout</button></form>
    </div>
  </header>
  <!-- ===IMPROVE-HTML-START=== -->
  <div id="improveToast" class="improve-toast"></div>

  <div id="improveModal" class="improve-modal-overlay">
    <div class="improve-modal-box">
      <h2>Report an Issue or Idea</h2>
      <div class="improve-path-badge" id="improvePagePath"></div>

      <div class="improve-type-group" id="improveTypeGroup">
        <label class="sel-bug" id="improveTypeBugLbl"><input type="radio" name="improveType" value="bug" checked /><span>Bug</span></label>
        <label id="improveTypeEnhLbl"><input type="radio" name="improveType" value="enhancement" /><span>Enhancement</span></label>
        <label id="improveTypeFeatLbl"><input type="radio" name="improveType" value="feature" /><span>Feature Request</span></label>
      </div>

      <label for="reportTitle">Title</label>
      <input type="text" id="reportTitle" placeholder="Brief summary" />

      <label for="reportDesc">Description</label>
      <textarea id="reportDesc" placeholder="Describe what happened or what you'd like improved"></textarea>

      <label>Screenshots</label>
      <div class="improve-ss-strip" id="improveSsStrip"></div>
      <div class="improve-ss-area" id="improveSsArea">Paste (Ctrl+V) or click to add screenshots (max 5)</div>
      <input type="file" id="improveSsFile" accept="image/*" multiple style="display:none" />

      <div class="improve-modal-actions">
        <button class="btn secondary" id="cancelReport">Cancel</button>
        <button class="btn" id="submitReport">Submit</button>
      </div>
    </div>
  </div>
  <!-- ===IMPROVE-HTML-END=== -->  <div class="wrap">
    <h1>BILLBACK Summary</h1>

    <div class="card">
      <div class="controls">
        <label>Group By:</label>
        <select id="groupBySelect" onchange="loadSummary()">
          <option value="am" selected>Asset Manager</option>
          <option value="property">Property</option>
          <option value="vendor">Vendor</option>
          <option value="charge_code">Charge Code</option>
          <option value="month">Month (Billback Period)</option>
        </select>
        <label style="margin-left:12px">Period:</label>
        <input type="text" id="periodFilter" placeholder="MM/YYYY (optional)" style="width:120px" onkeydown="if(event.key==='Enter') loadSummary();" />
        <button class="btn" onclick="loadSummary()">Refresh</button>
        <span id="pdfReadyHint" style="font-size:11px;color:#64748b;margin-left:8px"></span>
      </div>

      <div id="loading" class="loading">Loading summary...</div>

      <div id="summaryContainer" style="display:none">
        <div class="summary-card">
          <h3>Total Billback Amount</h3>
          <div class="value" id="totalAmount">$0.00</div>
          <div style="margin-top:8px;color:#64748b;font-size:13px">
            <span id="totalItems">0</span> line items across <span id="totalGroups">0</span> <span id="totalGroupsLabel">asset managers</span>
          </div>
        </div>

        <div id="groupsContainer"></div>
      </div>
    </div>
  </div>

  <style>
    .am-block{background:#fff;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden}
    .am-block summary{padding:16px 20px;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:#fff;cursor:pointer;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;list-style:none}
    .am-block summary::-webkit-details-marker{display:none}
    .am-block summary::before{content:"▸";display:inline-block;margin-right:10px;transition:transform .15s}
    .am-block[open] summary::before{transform:rotate(90deg)}
    .am-block .am-meta{font-size:12px;font-weight:500;opacity:.85;margin-left:auto;display:flex;gap:14px;align-items:center}
    .am-block .am-amount{font-size:18px;font-weight:700}
    .prop-block{padding:14px 20px;border-bottom:1px solid #f1f5f9}
    .prop-block:last-child{border-bottom:none}
    .prop-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px}
    .prop-name{font-size:15px;font-weight:700;color:#0f172a}
    .prop-stats{font-size:12px;color:#64748b;margin-top:2px}
    .prop-amount{font-size:16px;font-weight:700;color:#0c4a6e;white-space:nowrap}
    .prop-note{margin:6px 0 10px 0;padding:6px 10px;background:#e0f2fe;border-left:3px solid #0ea5e9;border-radius:6px;font-size:12px;color:#0c4a6e;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .prop-note-empty{margin:6px 0 10px 0;font-size:11px;color:#94a3b8;font-style:italic}
    .items-table{width:100%;border-collapse:collapse;background:#fafafa;border-radius:6px;overflow:hidden}
    .items-table th{padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#475569;background:#f1f5f9;text-align:left;font-weight:600;border-bottom:1px solid #e5e7eb}
    .items-table td{padding:6px 8px;font-size:12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
    .items-table tr:last-child td{border-bottom:none}
    .pdf-pill{display:inline-block;padding:2px 8px;border-radius:4px;background:#dbeafe;color:#1e40af;font-size:10px;font-weight:600;text-decoration:none}
    .pdf-pill:hover{background:#1e40af;color:#fff}
    .pdf-missing{color:#94a3b8;font-size:10px;font-style:italic}
  </style>

  <script>
    let currentSummary = null;

    function showToast(msg, type){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type === 'ok' ? 'ok' : 'err');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function showImproveToast(msg, type){
      const t = document.getElementById('improveToast');
      t.textContent = msg;
      t.className = 'improve-toast ' + (type === 'ok' ? 'ok' : 'err');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escapeHtml(s){
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function fmtMoney(n){
      const v = Number(n || 0);
      return '$' + v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    async function loadSummary(){
      const groupBy = document.getElementById('groupBySelect').value;
      const period = document.getElementById('periodFilter').value.trim();

      document.getElementById('loading').style.display = 'block';
      document.getElementById('summaryContainer').style.display = 'none';

      try {
        const qs = new URLSearchParams({group_by: groupBy});
        if (period) qs.set('period', period);
        const response = await fetch('/api/billback/summary?' + qs.toString());
        if (!response.ok) throw new Error('Failed to load summary');

        const data = await response.json();
        currentSummary = data;
        renderSummary(data);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('summaryContainer').style.display = 'block';
      } catch (e) {
        console.error('Error loading summary:', e);
        document.getElementById('loading').textContent = 'Error loading summary: ' + e.message;
        showToast('Error loading summary', 'err');
      }
    }

    function renderSummary(data){
      const summary = data.summary || [];
      const groupBy = data.group_by || 'am';

      document.getElementById('totalAmount').textContent = fmtMoney(data.total_amount);
      document.getElementById('totalItems').textContent = (data.total_items || 0).toLocaleString();
      document.getElementById('totalGroups').textContent = summary.length.toLocaleString();
      const labels = { am: 'asset managers', property: 'properties', vendor: 'vendors', charge_code: 'charge codes', month: 'billback periods' };
      document.getElementById('totalGroupsLabel').textContent = labels[groupBy] || 'groups';

      const hint = document.getElementById('pdfReadyHint');
      hint.textContent = data.pdf_lookup_ready
        ? 'PDF lookup: live (search index ready)'
        : 'PDF lookup: warming up (some PDFs may be missing — refresh in ~30s)';
      hint.style.color = data.pdf_lookup_ready ? '#059669' : '#a16207';

      const c = document.getElementById('groupsContainer');
      c.innerHTML = '';

      if (summary.length === 0) {
        c.innerHTML = '<div style="text-align:center;padding:40px;color:#64748b">No billback data found for the selected filter.</div>';
        return;
      }

      // AM-grouped layout uses nested properties; legacy group_by uses flat tables.
      if (groupBy === 'am') {
        summary.forEach(am => c.appendChild(renderAmBlock(am)));
      } else {
        summary.forEach(grp => c.appendChild(renderFlatGroup(grp)));
      }
    }

    function renderAmBlock(am) {
      const block = document.createElement('details');
      block.className = 'am-block';
      block.open = true;
      const propsHtml = (am.properties || []).map(p => {
        const noteHtml = p.property_note
          ? `<div class="prop-note">📝 ${escapeHtml(p.property_note)}</div>`
          : `<div class="prop-note-empty">No property note yet — add one on Master Bills to surface context here.</div>`;
        const itemsRows = (p.items || []).map(it => {
          const pdfCell = it.pdf_url
            ? `<a class="pdf-pill" href="${escapeHtml(it.pdf_url)}" target="_blank" rel="noopener">View PDF</a>`
            : `<span class="pdf-missing">no PDF match</span>`;
          return `
            <tr>
              <td>${escapeHtml(it.billback_period || '')}</td>
              <td>${escapeHtml(it.vendor_name || '')}</td>
              <td>${escapeHtml(it.account_number || '')}</td>
              <td>${escapeHtml(it.charge_code || '')}</td>
              <td>${escapeHtml(it.utility_type || '')}</td>
              <td style="text-align:right;font-variant-numeric:tabular-nums">${fmtMoney(it.billback_amount)}</td>
              <td style="font-style:italic;color:#64748b">${escapeHtml(it.notes || '')}</td>
              <td>${pdfCell}</td>
            </tr>`;
        }).join('');
        return `
          <div class="prop-block">
            <div class="prop-head">
              <div>
                <div class="prop-name">${escapeHtml(p.property_name)}</div>
                <div class="prop-stats">${p.count} item${p.count === 1 ? '' : 's'}${p.property_id ? ' · ID ' + escapeHtml(p.property_id) : ''}</div>
              </div>
              <div class="prop-amount">${fmtMoney(p.total_amount)}</div>
            </div>
            ${noteHtml}
            <table class="items-table">
              <thead>
                <tr>
                  <th>Period</th>
                  <th>Vendor</th>
                  <th>Account</th>
                  <th>Charge Code</th>
                  <th>Utility</th>
                  <th style="text-align:right">Amount</th>
                  <th>Notes</th>
                  <th>PDF</th>
                </tr>
              </thead>
              <tbody>${itemsRows}</tbody>
            </table>
          </div>`;
      }).join('');

      block.innerHTML = `
        <summary>
          <span>${escapeHtml(am.asset_manager || am.group_key || 'Unassigned')}</span>
          <span class="am-meta">
            <span>${am.property_count || (am.properties ? am.properties.length : 0)} propert${(am.property_count === 1 || (am.properties && am.properties.length === 1)) ? 'y' : 'ies'}</span>
            <span>${am.count} line${am.count === 1 ? '' : 's'}</span>
            <span class="am-amount">${fmtMoney(am.total_amount)}</span>
          </span>
        </summary>
        ${propsHtml || '<div style="padding:14px 20px;color:#64748b;font-size:12px">No properties.</div>'}`;
      return block;
    }

    function renderFlatGroup(group) {
      const section = document.createElement('div');
      section.className = 'group-section';
      const itemsRows = (group.items || []).map(item => {
        const pdfCell = item.pdf_url
          ? `<a class="pdf-pill" href="${escapeHtml(item.pdf_url)}" target="_blank" rel="noopener">View PDF</a>`
          : `<span class="pdf-missing">—</span>`;
        return `
          <tr>
            <td>${escapeHtml(item.property_name || 'N/A')}</td>
            <td>${escapeHtml(item.vendor_name || 'N/A')}</td>
            <td>${escapeHtml(item.account_number || '')}</td>
            <td>${escapeHtml(item.charge_code || 'N/A')}</td>
            <td>${escapeHtml(item.billback_period || 'N/A')}</td>
            <td style="text-align:right;font-variant-numeric:tabular-nums">${fmtMoney(item.billback_amount)}</td>
            <td style="font-style:italic;color:#64748b">${escapeHtml(item.notes || '')}</td>
            <td>${pdfCell}</td>
          </tr>`;
      }).join('');
      section.innerHTML = `
        <div class="group-header">
          <div class="group-title">${escapeHtml(group.group_key)} (${group.count} items)</div>
          <div class="group-amount">${fmtMoney(group.total_amount)}</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Vendor</th>
              <th>Account</th>
              <th>Charge Code</th>
              <th>Billback Period</th>
              <th style="text-align:right">Amount</th>
              <th>Notes</th>
              <th>PDF</th>
            </tr>
          </thead>
          <tbody>${itemsRows}</tbody>
        </table>`;
      return section;
    }

    // Load summary on page load
    loadSummary();

    // ===IMPROVE-JS-START===
    (function(){
      // ---------- helpers ----------
      function showImproveToast(msg, type){
        const t = document.getElementById('improveToast');
        if (!t) return;
        t.textContent = msg;
        t.className = 'improve-toast ' + (type === 'ok' ? 'ok' : 'err');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      }

      // ---------- refs ----------
      const modal       = document.getElementById('improveModal');
      const improveBtn  = document.getElementById('improveBtn');
      const cancelBtn   = document.getElementById('cancelReport');
      const submitBtn   = document.getElementById('submitReport');
      const titleInput  = document.getElementById('reportTitle');
      const descInput   = document.getElementById('reportDesc');
      const ssArea      = document.getElementById('improveSsArea');
      const ssStrip     = document.getElementById('improveSsStrip');
      const ssFileInput = document.getElementById('improveSsFile');
      const pathBadge   = document.getElementById('improvePagePath');
      const typeGroup   = document.getElementById('improveTypeGroup');

      if (!improveBtn || !modal) return;

      // ---------- state ----------
      let _ssKeys = [];        // uploaded S3 keys
      let _ssUploading = 0;
      let _tempReportId = '';  // generated before first upload so screenshots share an id
      let _consoleErrors = []; // captured console errors

      // capture console errors for page context
      window.addEventListener('error', function(e){
        _consoleErrors.push({msg: e.message || '', src: e.filename || '', line: e.lineno || 0});
        if (_consoleErrors.length > 20) _consoleErrors.shift();
      });

      // ---------- type selector ----------
      function updateTypeStyles(){
        const checked = typeGroup.querySelector('input[type=radio]:checked');
        typeGroup.querySelectorAll('label').forEach(function(lbl){
          lbl.className = '';
        });
        if (checked) {
          const v = checked.value;
          checked.parentElement.className = 'sel-' + v;
        }
      }
      typeGroup.querySelectorAll('input[type=radio]').forEach(function(r){
        r.addEventListener('change', updateTypeStyles);
      });

      // ---------- page path ----------
      function refreshPathBadge(){
        pathBadge.textContent = window.location.pathname + (window.location.search || '');
        pathBadge.title = window.location.href;
      }

      // ---------- open / close ----------
      function resetModal(){
        titleInput.value = '';
        descInput.value = '';
        ssStrip.innerHTML = '';
        _ssKeys = [];
        _ssUploading = 0;
        _tempReportId = '';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        const bugRadio = typeGroup.querySelector('input[value=bug]');
        if (bugRadio) { bugRadio.checked = true; updateTypeStyles(); }
      }

      improveBtn.addEventListener('click', function(){
        _tempReportId = crypto.randomUUID ? crypto.randomUUID() : ('xx-' + Date.now() + '-' + Math.random().toString(36).slice(2));
        refreshPathBadge();
        modal.classList.add('show');
        titleInput.focus();
      });

      cancelBtn.addEventListener('click', function(){
        modal.classList.remove('show');
        resetModal();
      });

      modal.addEventListener('click', function(e){
        if (e.target === modal){
          modal.classList.remove('show');
          resetModal();
        }
      });

      // ---------- screenshot helpers ----------
      function addScreenshotFile(file){
        if (!file || !file.type.startsWith('image/')) return;
        if (_ssKeys.length + _ssUploading >= 5){
          showImproveToast('Max 5 screenshots', 'err');
          return;
        }
        if (file.size > 5 * 1024 * 1024){
          showImproveToast('Image exceeds 5 MB limit', 'err');
          return;
        }

        const reader = new FileReader();
        reader.onload = function(){
          const dataUrl = reader.result;
          const contentType = file.type || 'image/png';

          // Create thumbnail immediately
          const thumb = document.createElement('div');
          thumb.className = 'improve-ss-thumb improve-ss-uploading';
          const img = document.createElement('img');
          img.src = dataUrl;
          thumb.appendChild(img);
          const removeBtn = document.createElement('button');
          removeBtn.className = 'ss-remove';
          removeBtn.textContent = '\u00d7';
          thumb.appendChild(removeBtn);
          ssStrip.appendChild(thumb);

          _ssUploading++;

          // Upload
          fetch('/api/debug/upload-screenshot', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              report_id: _tempReportId,
              image_data: dataUrl,
              content_type: contentType
            })
          })
          .then(function(r){ return r.json(); })
          .then(function(data){
            _ssUploading--;
            if (data.ok){
              thumb.classList.remove('improve-ss-uploading');
              const key = data.key;
              _ssKeys.push(key);
              removeBtn.addEventListener('click', function(){
                thumb.remove();
                _ssKeys = _ssKeys.filter(function(k){ return k !== key; });
              });
            } else {
              thumb.remove();
              showImproveToast(data.error || 'Upload failed', 'err');
            }
          })
          .catch(function(){
            _ssUploading--;
            thumb.remove();
            showImproveToast('Screenshot upload failed', 'err');
          });
        };
        reader.readAsDataURL(file);
      }

      // Paste handler — only active when modal is open
      document.addEventListener('paste', function(e){
        if (!modal.classList.contains('show')) return;
        const items = (e.clipboardData || {}).items || [];
        for (let i = 0; i < items.length; i++){
          if (items[i].type.indexOf('image') !== -1){
            e.preventDefault();
            addScreenshotFile(items[i].getAsFile());
            return;
          }
        }
      });

      // Click-to-upload via hidden file input
      ssArea.addEventListener('click', function(){ ssFileInput.click(); });
      ssFileInput.addEventListener('change', function(){
        var files = ssFileInput.files || [];
        for (var i = 0; i < files.length; i++) addScreenshotFile(files[i]);
        ssFileInput.value = '';
      });

      // Drag-and-drop
      ssArea.addEventListener('dragover', function(e){ e.preventDefault(); ssArea.classList.add('drag'); });
      ssArea.addEventListener('dragleave', function(){ ssArea.classList.remove('drag'); });
      ssArea.addEventListener('drop', function(e){
        e.preventDefault();
        ssArea.classList.remove('drag');
        var files = e.dataTransfer.files || [];
        for (var i = 0; i < files.length; i++) addScreenshotFile(files[i]);
      });

      // ---------- page context ----------
      function collectPageContext(){
        var ctx = {
          href: window.location.href,
          pathname: window.location.pathname,
          search: window.location.search,
          viewport: window.innerWidth + 'x' + window.innerHeight,
          userAgent: navigator.userAgent
        };
        // Capture visible error messages on the page
        var errEls = document.querySelectorAll('.error, .err, [role=alert]');
        var pageErrors = [];
        errEls.forEach(function(el){
          var txt = (el.textContent || '').trim().substring(0, 200);
          if (txt) pageErrors.push(txt);
        });
        if (pageErrors.length) ctx.pageErrors = pageErrors;
        if (_consoleErrors.length) ctx.consoleErrors = _consoleErrors.slice(-10);
        return ctx;
      }

      // ---------- submit ----------
      submitBtn.addEventListener('click', async function(){
        if (submitBtn.disabled) return;
        var title = titleInput.value.trim();
        var description = descInput.value.trim();

        if (!title || !description){
          showImproveToast('Please fill in title and description', 'err');
          return;
        }
        if (_ssUploading > 0){
          showImproveToast('Screenshots still uploading...', 'err');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        var checkedType = typeGroup.querySelector('input[type=radio]:checked');
        var reportType = checkedType ? checkedType.value : 'bug';

        try {
          var resp = await fetch('/api/debug/report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              title: title,
              description: description,
              page_url: window.location.href,
              type: reportType,
              screenshots: _ssKeys,
              page_context: collectPageContext()
            })
          });
          if (!resp.ok) throw new Error('Submit failed');
          showImproveToast('Report submitted!', 'ok');
          modal.classList.remove('show');
          resetModal();
        } catch (e) {
          showImproveToast('Error submitting report', 'err');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit';
        }
      });
    })();
    // ===IMPROVE-JS-END===
  </script>
</body>
</html>
