<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Bills &middot; Bill Review @ JRK</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    :root{
      --void:#0a0e1a;--surface:#111827;--surface2:#1e293b;--edge:#2a3548;--dim:#4b5c78;
      --text:#c8d6e5;--bright:#e8f0fe;
      --cyan:#06d6a0;--cyan-dim:rgba(6,214,160,.12);--cyan-glow:rgba(6,214,160,.3);
      --blue:#3a86ff;--blue-dim:rgba(58,134,255,.12);
      --amber:#ffbe0b;--amber-dim:rgba(255,190,11,.12);
      --red:#ef476f;--red-dim:rgba(239,71,111,.12);
      --purple:#8338ec;--purple-dim:rgba(131,56,236,.12);
      --orange:#fb5607;
      --mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
    }
    body{font-family:var(--sans);margin:0;background:var(--void);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:
      radial-gradient(ellipse 70% 50% at 30% 20%,rgba(6,214,160,.04),transparent),
      radial-gradient(ellipse 50% 40% at 70% 80%,rgba(58,134,255,.03),transparent);pointer-events:none}
    header{position:sticky;top:0;z-index:100;height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;
      background:rgba(10,14,26,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--edge)}
    header .left{display:flex;align-items:center;gap:14px}
    header .back{color:var(--dim);text-decoration:none;font-size:18px;transition:color .15s}
    header .back:hover{color:var(--cyan)}
    header h1{margin:0;font-size:15px;font-weight:700;color:var(--bright)}
    header h1 span{color:var(--cyan);font-family:var(--mono)}
    .nav-link{color:var(--dim);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid var(--edge);border-radius:8px;transition:all .15s}
    .nav-link:hover{color:var(--bright);border-color:var(--dim)}
    .shell{max-width:1060px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}
    .controls{display:flex;align-items:center;gap:16px;margin-bottom:20px}
    .controls select{padding:8px 12px;background:var(--surface);border:1px solid var(--edge);border-radius:8px;color:var(--bright);font-family:var(--sans);font-size:13px}
    .controls .user{color:var(--dim);font-size:12px;font-family:var(--mono)}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
    .kpi{background:var(--surface);border:1px solid var(--edge);border-radius:12px;padding:16px;text-align:center;transition:border-color .2s}
    .kpi:hover{border-color:var(--dim)}
    .kpi .num{font-size:26px;font-weight:700;color:var(--cyan);font-family:var(--mono)}
    .kpi .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;font-family:var(--mono)}
    .card{background:var(--surface);border:1px solid var(--edge);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:12px 16px;font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--dim);
      background:var(--surface2);border-bottom:1px solid var(--edge)}
    td{padding:12px 16px;border-bottom:1px solid rgba(42,53,72,.5)}
    tr{transition:background .1s}
    tr:hover td{background:rgba(58,134,255,.04)}
    .fname{font-weight:600;color:var(--bright);font-size:13px}
    .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:.3px}
    .badge-S1,.badge-S1_standard,.badge-S1_largefile{background:var(--amber-dim);color:var(--amber)}
    .badge-S3,.badge-S4{background:var(--blue-dim);color:var(--blue)}
    .badge-S6{background:var(--purple-dim);color:var(--purple)}
    .badge-S7{background:var(--cyan-dim);color:var(--cyan)}
    .badge-S8,.badge-ARCHIVE{background:rgba(131,56,236,.12);color:var(--purple)}
    .badge-FAILED,.badge-DELETED{background:var(--red-dim);color:var(--red)}
    .badge-REWORK{background:rgba(251,86,7,.12);color:var(--orange)}
    .tl-link{color:var(--blue);text-decoration:none;font-size:11px;font-family:var(--mono);padding:4px 10px;border:1px solid var(--edge);
      border-radius:6px;transition:all .15s;white-space:nowrap}
    .tl-link:hover{border-color:var(--blue);background:var(--blue-dim)}
    .time-cell{font-size:11px;color:var(--dim);font-family:var(--mono)}
    .empty-state{text-align:center;padding:60px;color:var(--dim);font-size:14px}
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a href="/" class="back">&#8592;</a>
      <h1><span>//</span> My Bills</h1>
    </div>
    <a href="/bill/timeline" class="nav-link">Bill Timeline</a>
  </header>
  <div class="shell">
    <div class="controls">
      <label style="color:var(--dim);font-size:13px">Period
        <select id="daysSelect" onchange="loadBills()">
          <option value="7">7 days</option>
          <option value="30" selected>30 days</option>
          <option value="90">90 days</option>
        </select>
      </label>
      <span class="user" id="userLabel"></span>
    </div>
    <div id="stats" class="kpis"></div>
    <div class="card"><div id="content"><div class="empty-state">Loading...</div></div></div>
  </div>
<script>
  const SL={'S1':'Received','S1_standard':'Parsing','S1_largefile':'Lg Parse','S3':'Parsed','S4':'Enriched','S6':'Pre-Entrata','S7':'Posted','S8':'UBI Assigned','ARCHIVE':'Archived','DELETED':'Deleted','REWORK':'Rework','FAILED':'Failed'};
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
  async function loadBills(){
    const days=document.getElementById('daysSelect').value,content=document.getElementById('content');
    content.innerHTML='<div class="empty-state">Loading...</div>';
    try{
      const resp=await fetch(`/api/my-bills?days=${days}`);
      if(resp.status===401){window.location='/login';return}
      const data=await resp.json();
      document.getElementById('userLabel').textContent=data.user||'';
      const bills=data.bills||[];
      const byStage={};bills.forEach(b=>{byStage[b.current_stage]=(byStage[b.current_stage]||0)+1});
      let sh=`<div class="kpi"><div class="num">${bills.length}</div><div class="label">Total</div></div>`;
      Object.entries(byStage).sort((a,b)=>b[1]-a[1]).forEach(([s,c])=>{
        sh+=`<div class="kpi"><div class="num" style="font-size:22px">${c}</div><div class="label">${esc(SL[s]||s)}</div></div>`;
      });
      document.getElementById('stats').innerHTML=sh;
      if(!bills.length){content.innerHTML='<div class="empty-state">No bills found in the last '+days+' days.</div>';return}
      let html='<table><thead><tr><th>File</th><th>Stage</th><th>Latest Event</th><th>First Seen</th><th>Updated</th><th></th></tr></thead><tbody>';
      bills.forEach(b=>{
        const bc='badge-'+(b.current_stage||'').replace(/[^a-zA-Z0-9_]/g,'');
        const t1=b.first_seen?(()=>{let s=b.first_seen;if(s.endsWith('+00:00'))s=s.replace('+00:00','Z');else if(!s.endsWith('Z'))s+='Z';const d=new Date(s);return isNaN(d)?'':d.toLocaleString();})():'';
        const t2=b.latest_time?(()=>{let s=b.latest_time;if(s.endsWith('+00:00'))s=s.replace('+00:00','Z');else if(!s.endsWith('Z'))s+='Z';const d=new Date(s);return isNaN(d)?'':d.toLocaleString();})():'';
        html+=`<tr>
          <td class="fname">${esc(b.filename||b.pdf_id.substring(0,14)+'...')}</td>
          <td><span class="badge ${bc}">${esc(SL[b.current_stage]||b.current_stage)}</span></td>
          <td style="font-size:12px">${esc((b.latest_event||'').replace(/_/g,' '))}</td>
          <td class="time-cell">${t1}</td><td class="time-cell">${t2}</td>
          <td><a href="/bill/timeline?pdf_id=${encodeURIComponent(b.pdf_id)}" class="tl-link">timeline</a></td>
        </tr>`;
      });
      html+='</tbody></table>';content.innerHTML=html;
    }catch(e){content.innerHTML='<div class="empty-state">Error loading bills.</div>'}
  }
  loadBills();
</script>
</body>
</html>
